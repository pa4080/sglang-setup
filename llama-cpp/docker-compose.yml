services:
  llama-cpp:
    container_name: llama-cpp
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../huggingface:/models
      - ./router.ini:/app/router.ini
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY}
    command: >
      --host 0.0.0.0
      --port 10005
      --models-preset /app/router.ini
      --models-max 1
      --no-warmup
      --context-shift
      --ctx-checkpoints 2
      --swa-checkpoints 2
      --cache-ram 10240     # 10 GiB: limit concurrent cached sessions to ~2-3, prevent retry storms
      --cache-reuse 4096
      --rope-scaling yarn
      --rope-scale 4
      --yarn-orig-ctx 32768



