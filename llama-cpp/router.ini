[*]
batch-size = 2048 ; b = 2048
ubatch-size = 512 ; ub = 512
flash-attn = on
cache-type-k = q4_0
cache-type-v = q4_0
fit = on                          ; auto-fit to VRAM (default)
fit-target = 1024                 ; 1024 MiB headroom per GPU (default)
fit-ctx = 4096                    ; min ctx-size when fitting (default)
temp = 0.8                        ; temperature (default)
top-k = 40                        ; top-k sampling (default)
top-p = 0.95                      ; top-p nucleus (default)
min-p = 0.05                      ; min-p filtering (default)
presence-penalty = 0.0            ; no presence penalty (default)
frequency-penalty = 0.0           ; no frequency penalty (default)
n-gpu-layers = 99 								; number of layers to offload to GPU
image-min-tokens = 1024					  ; min tokens for image input
; mlock = true
; jinja = true
; host = 0.0.0.0
; seed = 42

