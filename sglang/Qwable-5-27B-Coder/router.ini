# SGLang Configuration Notes
# This file is for reference only - SGLang doesn't use router.ini
# Configuration is set in docker-compose.yml command section

# Current Settings:
# - Model: Qwable-5-27B-Coder-Q4_K_M.gguf
# - Context: 131K tokens
# - KV Cache: fp8_e5m2
# - Memory: 80% static
# - Max requests: 24
# - CUDA graph batch sizes: up to 32

# To enable multimodal/vision support:
# 1. SGLang GGUF loader doesn't support separate mmproj files
# 2. You'd need to use the full non-GGUF model instead
# 3. See README.md for details
[*]
batch-size = 2048
ubatch-size = 512
flash-attn = on
cache-type-k = q4_0
cache-type-v = q4_0
fit = on
fit-target = 1024
fit-ctx = 4096
temp = 0.7
top-k = 40
top-p = 0.95
min-p = 0.05
presence-penalty = 0.0
frequency-penalty = 0.0
n-gpu-layers = 99
image-min-tokens = 1024

[Qwable-5-27B-Coder-128K-Vision]
model = /models/DJLougen/Qwable-5-27B-Coder-GGUF/Qwable-5-27B-Coder-Q4_K_M.gguf
mmproj = /models/DJLougen/Qwable-5-27B-Coder-GGUF/mmproj-Qwable-5-27B-Coder-f16.gguf
ctx-size = 131072
batch-size = 4096
ubatch-size = 1024
cache-type-k = q4_0
cache-type-v = q4_0
temp = 0.6
top-k = 20
top-p = 0.95
min-p = 0.0
presence-penalty = 0.0

[Qwable-5-27B-Coder-64K-Vision]
model = /models/DJLougen/Qwable-5-27B-Coder-GGUF/Qwable-5-27B-Coder-Q4_K_M.gguf
