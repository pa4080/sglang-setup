services:
  sglang-serve:
    container_name: gemma-4-26b-serve
    image: lmsysorg/sglang:latest
    restart: unless-stopped
    ports:
      - "10007:8000"
    volumes:
      - ../../huggingface:/models
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - API_KEY=${LLAMA_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    command: >
      python3 -m sglang.launch_server
      --model-path /models/unsloth/gemma-4-26B-A4B-it-qat-GGUF/gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
      --served-model-name Gemma-4-26B-A4B-Q4_K_XL
      --load-format gguf
      --kv-cache-dtype bfloat16
      --context-length 131072
      --port 8000
      --host 0.0.0.0
      --mem-fraction-static 0.78
      --chunked-prefill-size 16384
      --max-prefill-tokens 32768
      --watchdog-timeout 600
      --tp 1
      --max-running-requests 20
      --cuda-graph-max-bs 32
