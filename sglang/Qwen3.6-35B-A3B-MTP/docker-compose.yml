services:
  sglang-serve:
    container_name: sglang-serve
    image: lmsysorg/sglang:latest
    restart: unless-stopped
    ports:
      - "10005:8000"
    volumes:
      - ../huggingface:/models
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - API_KEY=${LLAMA_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    command: >
      python3 -m sglang.launch_server
      --model-path /models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
      --model-name Qwen3.6-35B-A3B-UD-IQ4_NL
      --load-format gguf
      --mmproj /models/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/mmproj-BF16.gguf
      --enable-multimodal
      --kv-cache-dtype fp8_e5m2
      --context-length 262144
      --port 8000
      --host 0.0.0.0
      --mem-fraction-static 0.85
      --chunked-prefill-size 16384
      --watchdog-timeout 600
      --tp 1
      --max-running-requests 16
